<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ML Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #0D0F14;
    --surface:  #161921;
    --border:   #252A35;
    --accent:   #FFE234;
    --accent2:  #00C48C;
    --danger:   #FF4D6D;
    --warning:  #FF9F43;
    --text:     #E8EAF0;
    --muted:    #6B7280;
    --radius:   14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  /* ── TOP BAR ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 1.2rem; font-weight: 800; }
  .logo-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; }
  .user-badge {
    display: flex; align-items: center; gap: 8px;
    background: var(--border); border-radius: 999px;
    padding: 6px 14px; font-size: .85rem; color: var(--muted);
  }
  .user-badge strong { color: var(--text); }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 80vh; gap: 20px; text-align: center;
    padding: 32px;
  }
  #auth-screen h2 { font-size: 2rem; font-weight: 800; }
  #auth-screen p  { color: var(--muted); max-width: 400px; line-height: 1.6; }

  /* ── MAIN ── */
  main { padding: 32px; max-width: 1280px; margin: 0 auto; }

  /* ── CONTROLS ── */
  .controls {
    display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;
    margin-bottom: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 22px;
  }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: .78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .field input[type=date] {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 8px 12px;
    font-family: 'DM Mono', monospace; font-size: .9rem;
  }
  .field input[type=date]:focus { outline: 2px solid var(--accent); }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 20px; border-radius: 8px; font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: .9rem; cursor: pointer; border: none;
    transition: all .15s ease;
  }
  .btn-primary { background: var(--accent); color: #0D0F14; }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-success { background: var(--accent2); color: #0D0F14; }
  .btn-success:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-outline {
    background: transparent; border: 1.5px solid var(--accent);
    color: var(--accent);
  }
  .btn-outline:hover { background: var(--accent); color: #0D0F14; }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  /* ── KPI CARDS ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 16px; margin-bottom: 28px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    display: flex; flex-direction: column; gap: 8px;
    position: relative; overflow: hidden;
    transition: transform .2s, border-color .2s;
  }
  .kpi-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 3px; height: 100%;
  }
  .kpi-card.yellow::before  { background: var(--accent); }
  .kpi-card.green::before   { background: var(--accent2); }
  .kpi-card.warning::before { background: var(--warning); }
  .kpi-card.danger::before  { background: var(--danger); }
  .kpi-label { font-size: .78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .kpi-value { font-size: 1.9rem; font-weight: 800; line-height: 1; }
  .kpi-value.yellow  { color: var(--accent); }
  .kpi-value.green   { color: var(--accent2); }
  .kpi-value.warning { color: var(--warning); }
  .kpi-value.danger  { color: var(--danger); }
  .kpi-sub { font-size: .8rem; color: var(--muted); font-family: 'DM Mono', monospace; }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .table-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
  }
  .table-header h3 { font-size: 1rem; font-weight: 700; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; padding: 12px 16px;
    font-size: .75rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: .07em;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,.02);
  }
  tbody tr { border-bottom: 1px solid rgba(255,255,255,.04); transition: background .12s; }
  tbody tr:hover { background: rgba(255,255,255,.03); }
  tbody td { padding: 12px 16px; font-size: .88rem; }
  .mono { font-family: 'DM Mono', monospace; }

  .badge {
    display: inline-block; padding: 3px 10px;
    border-radius: 999px; font-size: .75rem; font-weight: 700;
  }
  .badge-paid     { background: rgba(0,196,140,.15); color: var(--accent2); }
  .badge-pending  { background: rgba(255,159,67,.15); color: var(--warning); }
  .badge-cancelled{ background: rgba(255,77,109,.15); color: var(--danger); }
  .badge-other    { background: rgba(107,114,128,.15); color: var(--muted); }

  /* ── LOADING ── */
  .loading {
    display: flex; justify-content: center; align-items: center;
    padding: 60px; color: var(--muted);
    flex-direction: column; gap: 14px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── EMPTY / ERROR ── */
  .empty { text-align: center; padding: 48px; color: var(--muted); font-size: .95rem; }

  /* ── QUICK FILTERS ── */
  .quick-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 0; }
  .qf {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 5px 13px; border-radius: 999px;
    font-size: .8rem; cursor: pointer; font-family: 'Syne', sans-serif;
    transition: all .15s;
  }
  .qf:hover, .qf.active { background: var(--accent); color: #0D0F14; border-color: var(--accent); font-weight: 700; }

  .hidden { display: none !important; }

  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 20px; font-size: .9rem;
    transform: translateY(80px); opacity: 0;
    transition: all .3s ease; z-index: 9999; pointer-events: none;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: var(--accent2); color: var(--accent2); }
  #toast.error   { border-color: var(--danger);  color: var(--danger); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    ML Dashboard
  </div>
  <div id="user-info" class="user-badge hidden">
    <span>👤</span> <strong id="user-name">—</strong>
  </div>
</header>

<!-- AUTH -->
<div id="auth-screen">
  <div style="font-size:3rem">🛒</div>
  <h2>Conecte sua conta</h2>
  <p>Autorize o acesso à sua conta do Mercado Livre para visualizar seus dados de vendas.</p>
  <button class="btn btn-primary" onclick="doLogin()">Entrar com Mercado Livre</button>
</div>

<!-- DASHBOARD -->
<main id="dashboard" class="hidden">

  <div class="controls">
    <div>
      <div style="font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Período rápido</div>
      <div class="quick-filters">
        <button class="qf active" onclick="setQuick('today',this)">Hoje</button>
        <button class="qf" onclick="setQuick('yesterday',this)">Ontem</button>
        <button class="qf" onclick="setQuick('week',this)">7 dias</button>
        <button class="qf" onclick="setQuick('month',this)">Este mês</button>
        <button class="qf" onclick="setQuick('30days',this)">30 dias</button>
      </div>
    </div>

    <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-left:auto">
      <div class="field">
        <label>De</label>
        <input type="date" id="date-from"/>
      </div>
      <div class="field">
        <label>Até</label>
        <input type="date" id="date-to"/>
      </div>
      <button class="btn btn-primary" id="btn-load" onclick="loadDashboard()">
        🔍 Buscar
      </button>
      <button class="btn btn-success" id="btn-export" onclick="exportExcel()" disabled>
        📥 Exportar Excel
      </button>
    </div>
  </div>

  <div class="kpi-grid" id="kpi-grid">
    <div class="loading"><div class="spinner"></div><span>Carregando...</span></div>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <h3>Pedidos do período</h3>
      <span id="order-count" style="font-size:.85rem;color:var(--muted)"></span>
    </div>
    <div id="orders-body">
      <div class="loading"><div class="spinner"></div><span>Carregando...</span></div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
const API = '';
let currentData = null;

// ── Helpers de data ──────────────────────────────────────────────────────────
function fmt(d) { return d.toISOString().split('T')[0]; }

function setQuick(range, btn) {
  document.querySelectorAll('.qf').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const now = new Date();
  let from, to;
  to = fmt(now);
  if (range === 'today') {
    from = fmt(now);
  } else if (range === 'yesterday') {
    const y = new Date(now); y.setDate(y.getDate()-1);
    from = to = fmt(y);
  } else if (range === 'week') {
    const w = new Date(now); w.setDate(w.getDate()-6);
    from = fmt(w);
  } else if (range === 'month') {
    from = fmt(new Date(now.getFullYear(), now.getMonth(), 1));
  } else if (range === '30days') {
    const d = new Date(now); d.setDate(d.getDate()-29);
    from = fmt(d);
  }
  document.getElementById('date-from').value = from;
  document.getElementById('date-to').value   = to;
}

function todayISO(start) {
  const now = new Date();
  const d   = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  return `${d}T${start ? '00:00:00' : '23:59:59'}.000-03:00`;
}

// ── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `show ${type}`;
  setTimeout(() => { el.className = ''; }, 3000);
}

// ── Auth ─────────────────────────────────────────────────────────────────────
async function checkAuth() {
  try {
    const r = await fetch(`${API}/auth/status`);
    const d = await r.json();
    if (d.authenticated) {
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('user-info').classList.remove('hidden');
      document.getElementById('user-name').textContent = d.user.nickname;
      setQuick('today', document.querySelector('.qf'));
      loadDashboard();
    }
  } catch(e) { console.error(e); }
}

async function doLogin() {
  const r = await fetch(`${API}/auth/login`);
  const d = await r.json();
  const w = window.open(d.auth_url, '_blank', 'width=600,height=700');
  const t = setInterval(async () => {
    const st = await fetch(`${API}/auth/status`).then(x=>x.json()).catch(()=>({authenticated:false}));
    if (st.authenticated) {
      clearInterval(t);
      w?.close();
      checkAuth();
    }
  }, 1500);
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
async function loadDashboard() {
  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;
  if (!from || !to) { toast('Selecione o período', 'error'); return; }

  const btn = document.getElementById('btn-load');
  btn.disabled = true; btn.textContent = '⏳ Buscando...';

  document.getElementById('kpi-grid').innerHTML = '<div class="loading"><div class="spinner"></div><span>Carregando...</span></div>';
  document.getElementById('orders-body').innerHTML = '<div class="loading"><div class="spinner"></div><span>Buscando pedidos...</span></div>';
  document.getElementById('btn-export').disabled = true;

  try {
    const df = `${from}T00:00:00.000-03:00`;
    const dt = `${to}T23:59:59.000-03:00`;
    const r  = await fetch(`${API}/api/dashboard?date_from=${encodeURIComponent(df)}&date_to=${encodeURIComponent(dt)}`);
    const d  = await r.json();

    if (d.error) { toast(d.error, 'error'); return; }
    currentData = d;
    renderKPIs(d.summary);
    renderTable(d.orders);
    document.getElementById('btn-export').disabled = false;
  } catch(e) {
    toast('Erro ao conectar com o servidor', 'error');
    document.getElementById('kpi-grid').innerHTML = '<div class="empty">⚠️ Erro ao carregar dados.</div>';
    document.getElementById('orders-body').innerHTML = '';
  } finally {
    btn.disabled = false; btn.innerHTML = '🔍 Buscar';
  }
}

function renderKPIs(s) {
  const cards = [
    { label: 'Pedidos Pagos',      value: s.paid_orders,                         cls: 'green',   sub: `de ${s.total_orders} totais` },
    { label: 'Pedidos Pendentes',  value: s.pending_orders,                      cls: 'warning', sub: 'aguardando pagamento' },
    { label: 'Pedidos Cancelados', value: s.cancelled_orders,                    cls: 'danger',  sub: '' },
    { label: 'Itens Vendidos',     value: s.items_sold,                           cls: 'yellow',  sub: 'unidades' },
    { label: 'Faturamento Bruto',  value: `R$ ${fmt2(s.total_revenue)}`,          cls: 'green',   sub: '' },
    { label: 'Total em Frete',     value: `R$ ${fmt2(s.total_shipping)}`,         cls: 'warning', sub: '' },
    { label: 'Faturamento Líquido',value: `R$ ${fmt2(s.net_revenue)}`,            cls: 'yellow',  sub: 'bruto − frete' },
  ];
  document.getElementById('kpi-grid').innerHTML = cards.map(c => `
    <div class="kpi-card ${c.cls}">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value ${c.cls}">${c.value}</div>
      ${c.sub ? `<div class="kpi-sub">${c.sub}</div>` : ''}
    </div>
  `).join('');
}

function fmt2(n) {
  return Number(n).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

const STATUS_MAP = {
  paid:                  ['Pago',               'paid'],
  confirmed:             ['Confirmado',          'pending'],
  payment_required:      ['Aguard. Pagamento',   'pending'],
  payment_in_process:    ['Pag. em Processo',    'pending'],
  cancelled:             ['Cancelado',           'cancelled'],
};

function renderTable(orders) {
  document.getElementById('order-count').textContent = `${orders.length} pedido(s)`;
  if (!orders.length) {
    document.getElementById('orders-body').innerHTML = '<div class="empty">Nenhum pedido neste período.</div>';
    return;
  }
  const rows = orders.map(o => {
    const [label, cls] = STATUS_MAP[o.status] || [o.status, 'other'];
    return `
      <tr>
        <td class="mono" style="color:var(--muted);font-size:.8rem">#${o.id}</td>
        <td class="mono">${o.date}</td>
        <td><span class="badge badge-${cls}">${label}</span></td>
        <td>${o.buyer}</td>
        <td style="max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${o.item}">${o.item}</td>
        <td class="mono" style="text-align:center">${o.quantity}</td>
        <td class="mono" style="color:var(--accent2)">R$ ${fmt2(o.total)}</td>
        <td class="mono" style="color:var(--warning)">R$ ${fmt2(o.shipping_cost)}</td>
      </tr>`;
  }).join('');

  document.getElementById('orders-body').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Data</th><th>Status</th><th>Comprador</th>
          <th>Produto</th><th>Qtd</th><th>Total</th><th>Frete</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── Export ───────────────────────────────────────────────────────────────────
async function exportExcel() {
  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;
  const df   = `${from}T00:00:00.000-03:00`;
  const dt   = `${to}T23:59:59.000-03:00`;
  const btn  = document.getElementById('btn-export');
  btn.disabled = true; btn.textContent = '⏳ Gerando...';

  try {
    const r = await fetch(`${API}/api/export/excel?date_from=${encodeURIComponent(df)}&date_to=${encodeURIComponent(dt)}`);
    if (!r.ok) throw new Error();
    const blob = await r.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `relatorio_ml_${from}_${to}.xlsx`;
    a.click(); URL.revokeObjectURL(url);
    toast('✅ Excel gerado com sucesso!');
  } catch(e) {
    toast('Erro ao gerar Excel', 'error');
  } finally {
    btn.disabled = false; btn.innerHTML = '📥 Exportar Excel';
  }
}

// ── Init ─────────────────────────────────────────────────────────────────────
checkAuth();
</script>
</body>
</html>
